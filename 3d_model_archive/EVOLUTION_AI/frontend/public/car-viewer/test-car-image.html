<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>汽车测试图片生成器</title>
<style>
body{background:#0a0a1a;color:#c0d0e0;font-family:monospace;padding:20px}
h2{color:#00d4ff;font-size:14px}
.grid{display:flex;flex-wrap:wrap;gap:16px;margin-top:12px}
.card{background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.2);border-radius:8px;padding:12px;text-align:center}
.card canvas{border:1px solid rgba(0,212,255,.15);border-radius:4px;cursor:pointer}
.card canvas:hover{border-color:#00d4ff}
.card p{font-size:10px;color:#5a6e8a;margin:6px 0 0}
.btn{margin-top:8px;padding:4px 12px;background:rgba(0,255,136,.15);color:#00ff88;border:1px solid rgba(0,255,136,.3);border-radius:4px;font-size:10px;cursor:pointer}
.btn:hover{background:rgba(0,255,136,.25)}
</style>
</head>
<body>
<h2>汽车测试图片生成器 - 点击图片或按钮下载</h2>
<div class="grid" id="grid"></div>
<script>
var types=[
  {name:'C级轿车',cat:'sedan',bg:'#2a3a5c',
   body:[[0,.42],[.05,.38],[.12,.30],[.20,.22],[.30,.18],[.40,.15],[.50,.14],[.60,.15],[.70,.18],[.78,.22],[.85,.30],[.92,.38],[.95,.42],[1,.42]],
   roof:[[.20,.22],[.25,.10],[.35,.05],[.50,.03],[.65,.05],[.75,.10],[.78,.22]],
   wheels:[{x:.18,y:.42,r:.08},{x:.82,y:.42,r:.08}]},
  {name:'SUV',cat:'suv',bg:'#2a4a2c',
   body:[[0,.48],[.05,.44],[.12,.36],[.20,.28],[.30,.22],[.40,.18],[.50,.16],[.60,.18],[.70,.22],[.80,.28],[.88,.36],[.95,.44],[1,.48]],
   roof:[[.18,.28],[.22,.12],[.32,.06],[.50,.04],[.68,.06],[.78,.12],[.80,.28]],
   wheels:[{x:.18,y:.48,r:.10},{x:.82,y:.48,r:.10}]},
  {name:'跑车',cat:'sport',bg:'#4a2a2a',
   body:[[0,.38],[.05,.35],[.12,.28],[.20,.22],[.30,.18],[.40,.16],[.50,.15],[.60,.16],[.70,.18],[.80,.22],[.88,.28],[.95,.35],[1,.38]],
   roof:[[.25,.22],[.30,.10],[.40,.04],[.55,.02],[.65,.04],[.72,.10],[.75,.22]],
   wheels:[{x:.16,y:.38,r:.07},{x:.84,y:.38,r:.07}]},
  {name:'MPV',cat:'mpv',bg:'#3a3a2a',
   body:[[0,.45],[.05,.42],[.10,.35],[.15,.25],[.25,.15],[.40,.10],[.60,.10],[.75,.15],[.85,.25],[.92,.35],[.95,.42],[1,.45]],
   roof:[[.15,.25],[.18,.08],[.25,.03],[.50,.02],[.75,.03],[.82,.08],[.85,.25]],
   wheels:[{x:.18,y:.45,r:.09},{x:.82,y:.45,r:.09}]},
  {name:'旅行车',cat:'wagon',bg:'#2a2a4a',
   body:[[0,.42],[.05,.38],[.12,.30],[.20,.22],[.30,.18],[.40,.15],[.50,.14],[.60,.14],[.70,.14],[.80,.16],[.88,.22],[.93,.30],[.96,.38],[1,.42]],
   roof:[[.20,.22],[.25,.10],[.35,.05],[.50,.03],[.65,.04],[.78,.08],[.83,.16]],
   wheels:[{x:.18,y:.42,r:.08},{x:.82,y:.42,r:.08}]}
];

var colors=[
  {name:'深蓝',fill:'#1a237e',stroke:'#3949ab'},
  {name:'银灰',fill:'#9e9e9e',stroke:'#bdbdbd'},
  {name:'红色',fill:'#c62828',stroke:'#ef5350'},
  {name:'白色',fill:'#e0e0e0',stroke:'#f5f5f5'},
  {name:'黑色',fill:'#212121',stroke:'#424242'}
];

var grid=document.getElementById('grid');

types.forEach(function(t){
  colors.forEach(function(c){
    var card=document.createElement('div');
    card.className='card';
    var cv=document.createElement('canvas');
    cv.width=400;cv.height=240;
    drawCar(cv,t,c);
    card.appendChild(cv);
    var p=document.createElement('p');
    p.textContent=t.name+' - '+c.name;
    card.appendChild(p);
    var btn=document.createElement('button');
    btn.className='btn';
    btn.textContent='下载';
    btn.onclick=function(){download(cv,t.name+'_'+c.name+'.png');};
    card.appendChild(btn);
    cv.onclick=function(){download(cv,t.name+'_'+c.name+'.png');};
    grid.appendChild(card);
  });
});

function drawCar(cv,type,color){
  var ctx=cv.getContext('2d');
  var w=cv.width,h=cv.height;

  // 背景渐变
  var grad=ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,'#1a1a2e');
  grad.addColorStop(1,type.bg);
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,w,h);

  // 地面
  ctx.fillStyle='rgba(255,255,255,0.03)';
  ctx.fillRect(0,h*0.7,w,h*0.3);
  ctx.strokeStyle='rgba(255,255,255,0.1)';
  ctx.beginPath();ctx.moveTo(0,h*0.7);ctx.lineTo(w,h*0.7);ctx.stroke();

  var margin=40;
  var cw=w-margin*2;
  var ch=h*0.5;
  var baseY=h*0.68;

  // 车身阴影
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(w/2,baseY+5,cw*0.45,8,0,0,Math.PI*2);
  ctx.fill();

  // 车身下部
  ctx.beginPath();
  type.body.forEach(function(pt,i){
    var x=margin+pt[0]*cw;
    var y=baseY-pt[1]*ch;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.lineTo(margin+cw,baseY);
  ctx.lineTo(margin,baseY);
  ctx.closePath();
  var bodyGrad=ctx.createLinearGradient(0,baseY-ch*0.4,0,baseY);
  bodyGrad.addColorStop(0,color.stroke);
  bodyGrad.addColorStop(1,color.fill);
  ctx.fillStyle=bodyGrad;
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.15)';
  ctx.lineWidth=1;
  ctx.stroke();

  // 车顶/车窗
  ctx.beginPath();
  type.roof.forEach(function(pt,i){
    var x=margin+pt[0]*cw;
    var y=baseY-pt[1]*ch;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  });
  ctx.closePath();
  var roofGrad=ctx.createLinearGradient(0,baseY-ch*0.4,0,baseY-ch*0.05);
  roofGrad.addColorStop(0,'rgba(100,150,200,0.6)');
  roofGrad.addColorStop(1,'rgba(60,100,160,0.3)');
  ctx.fillStyle=roofGrad;
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.2)';
  ctx.lineWidth=0.5;
  ctx.stroke();

  // B柱
  var bPillarX=margin+cw*0.48;
  var roofMidY=baseY-type.roof[3][1]*ch;
  var bodyMidY=baseY-type.body[5][1]*ch;
  ctx.strokeStyle='rgba(0,0,0,0.4)';
  ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(bPillarX,roofMidY+2);ctx.lineTo(bPillarX,bodyMidY+2);ctx.stroke();

  // 车轮
  type.wheels.forEach(function(wh){
    var wx=margin+wh.x*cw;
    var wy=baseY;
    var wr=wh.r*ch;

    // 轮胎
    ctx.beginPath();
    ctx.arc(wx,wy,wr,0,Math.PI*2);
    ctx.fillStyle='#1a1a1a';
    ctx.fill();
    ctx.strokeStyle='#333';
    ctx.lineWidth=2;
    ctx.stroke();

    // 轮毂
    ctx.beginPath();
    ctx.arc(wx,wy,wr*0.6,0,Math.PI*2);
    var hubGrad=ctx.createRadialGradient(wx-2,wy-2,0,wx,wy,wr*0.6);
    hubGrad.addColorStop(0,'#aaa');
    hubGrad.addColorStop(1,'#555');
    ctx.fillStyle=hubGrad;
    ctx.fill();

    // 轮毂辐条
    ctx.strokeStyle='#777';
    ctx.lineWidth=1.5;
    for(var s=0;s<5;s++){
      var angle=s*Math.PI*2/5-Math.PI/2;
      ctx.beginPath();
      ctx.moveTo(wx,wy);
      ctx.lineTo(wx+Math.cos(angle)*wr*0.55,wy+Math.sin(angle)*wr*0.55);
      ctx.stroke();
    }

    // 中心盖
    ctx.beginPath();
    ctx.arc(wx,wy,wr*0.15,0,Math.PI*2);
    ctx.fillStyle='#888';
    ctx.fill();
  });

  // 车灯
  // 前灯
  ctx.beginPath();
  ctx.ellipse(margin+cw*0.03,baseY-type.body[0][1]*ch-5,8,5,0,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,200,0.8)';
  ctx.fill();
  ctx.shadowColor='rgba(255,255,200,0.5)';
  ctx.shadowBlur=10;
  ctx.fill();
  ctx.shadowBlur=0;

  // 尾灯
  ctx.beginPath();
  ctx.ellipse(margin+cw*0.97,baseY-type.body[type.body.length-1][1]*ch-5,6,4,0,0,Math.PI*2);
  ctx.fillStyle='rgba(255,50,50,0.8)';
  ctx.fill();
  ctx.shadowColor='rgba(255,50,50,0.5)';
  ctx.shadowBlur=8;
  ctx.fill();
  ctx.shadowBlur=0;

  // 腰线
  ctx.strokeStyle='rgba(255,255,255,0.08)';
  ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(margin+cw*0.05,baseY-ch*0.28);
  ctx.lineTo(margin+cw*0.95,baseY-ch*0.28);
  ctx.stroke();

  // 地面反射
  ctx.save();
  ctx.globalAlpha=0.08;
  ctx.translate(0,baseY*2);
  ctx.scale(1,-1);
  ctx.drawImage(cv,0,0);
  ctx.restore();
}

function download(cv,name){
  var a=document.createElement('a');
  a.download=name;
  a.href=cv.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
