<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>协同共生系统 - 3D实时互动</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @font-face {
            font-family: 'Jura';
            src: url('https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/jura/Jura%5Bwght%5D.ttf') format('truetype');
            font-weight: 300 700;
        }
        @font-face {
            font-family: 'Tektur';
            src: url('https://cdn.jsdelivr.net/gh/google/fonts@main/ofl/tektur/Tektur%5Bwdth%2Cwght%5D.ttf') format('truetype');
            font-weight: 400 900;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #020408;
            font-family: 'Jura', sans-serif;
        }
        
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        
        .ui-layer {
            position: fixed;
            z-index: 10;
            pointer-events: none;
        }
        
        .header {
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
        
        .header h1 {
            font-family: 'Tektur', sans-serif;
            font-size: 2.5rem;
            font-weight: 600;
            color: #f8fafc;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
            opacity: 0;
            animation: fadeInDown 1.5s ease forwards;
        }
        
        .header .subtitle {
            font-size: 0.9rem;
            color: #06b6d4;
            letter-spacing: 0.2em;
            margin-top: 10px;
            opacity: 0;
            animation: fadeInUp 1.5s ease 0.3s forwards;
        }
        
        .stats-panel {
            bottom: 40px;
            left: 40px;
            background: rgba(2, 4, 8, 0.8);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 8px;
            padding: 20px 30px;
            backdrop-filter: blur(10px);
            opacity: 0;
            animation: fadeInRight 1s ease 0.8s forwards;
        }
        
        .stats-panel .stat-row {
            display: flex;
            align-items: center;
            margin: 8px 0;
            font-size: 0.85rem;
            color: #94a3b8;
        }
        
        .stats-panel .stat-label {
            width: 120px;
            letter-spacing: 0.1em;
        }
        
        .stats-panel .stat-value {
            color: #00d4ff;
            font-family: 'Tektur', monospace;
            font-weight: 600;
        }
        
        .controls-panel {
            bottom: 40px;
            right: 40px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            opacity: 0;
            animation: fadeInLeft 1s ease 1s forwards;
        }
        
        .control-btn {
            pointer-events: auto;
            background: rgba(2, 4, 8, 0.9);
            border: 1px solid rgba(124, 58, 237, 0.4);
            color: #f8fafc;
            padding: 12px 24px;
            border-radius: 6px;
            font-family: 'Jura', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        
        .control-btn:hover {
            background: rgba(124, 58, 237, 0.2);
            border-color: rgba(124, 58, 237, 0.8);
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.3);
            transform: translateX(-5px);
        }
        
        .control-btn.active {
            background: rgba(0, 212, 255, 0.2);
            border-color: rgba(0, 212, 255, 0.8);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }
        
        .dimension-markers {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        
        .marker {
            position: absolute;
            font-family: 'Tektur', sans-serif;
            font-size: 1.2rem;
            color: rgba(248, 250, 252, 0.6);
            letter-spacing: 0.2em;
        }
        
        .marker-t { top: 60px; left: 60px; }
        .marker-s { top: 60px; right: 60px; }
        .marker-p { bottom: 120px; left: 60px; }
        .marker-e { bottom: 120px; right: 60px; }
        
        .marker::after {
            content: attr(data-label);
            display: block;
            font-size: 0.7rem;
            color: rgba(148, 163, 184, 0.5);
            margin-top: 4px;
        }
        
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #020408;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease;
        }
        
        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-ring {
            width: 80px;
            height: 80px;
            border: 2px solid transparent;
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .loading-text {
            margin-top: 20px;
            font-family: 'Tektur', sans-serif;
            font-size: 0.9rem;
            color: #00d4ff;
            letter-spacing: 0.3em;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        @keyframes fadeInLeft {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .interaction-hint {
            position: fixed;
            bottom: 50%;
            left: 50%;
            transform: translate(-50%, 50%);
            font-size: 0.8rem;
            color: rgba(148, 163, 184, 0.4);
            letter-spacing: 0.2em;
            pointer-events: none;
            opacity: 0;
            animation: pulseHint 3s ease-in-out infinite;
        }
        
        @keyframes pulseHint {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loading">
        <div class="loading-ring"></div>
        <div class="loading-text">INITIALIZING QUANTUM FIELD</div>
    </div>
    
    <div id="canvas-container"></div>
    
    <div class="ui-layer header">
        <h1>协同共生系统</h1>
        <div class="subtitle">SYNERGETIC COEXISTENCE SYSTEM</div>
    </div>
    
    <div class="ui-layer dimension-markers">
        <div class="marker marker-t" data-label="TEMPORAL">T</div>
        <div class="marker marker-s" data-label="SPATIAL">S</div>
        <div class="marker marker-p" data-label="PHASE">P</div>
        <div class="marker marker-e" data-label="ENERGY">E</div>
    </div>
    
    <div class="ui-layer stats-panel">
        <div class="stat-row">
            <span class="stat-label">NEURAL NODES</span>
            <span class="stat-value" id="node-count">10,000,000,000</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">QUANTUM LINKS</span>
            <span class="stat-value" id="link-count">∞</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">4D CHANNELS</span>
            <span class="stat-value">ACTIVE</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">CORE STATUS</span>
            <span class="stat-value" style="color: #fbbf24;">ONLINE</span>
        </div>
    </div>
    
    <div class="ui-layer controls-panel">
        <button class="control-btn active" id="btn-rotate" onclick="toggleRotation()">AUTO ROTATE</button>
        <button class="control-btn" id="btn-pulse" onclick="togglePulse()">QUANTUM PULSE</button>
        <button class="control-btn" id="btn-wireframe" onclick="toggleWireframe()">WIREFRAME</button>
        <button class="control-btn" id="btn-reset" onclick="resetView()">RESET VIEW</button>
    </div>
    
    <div class="interaction-hint">DRAG TO ROTATE · SCROLL TO ZOOM</div>

    <script>
        // Three.js Scene Setup
        let scene, camera, renderer, controls;
        let coreGroup, neuralGroup, quantumGroup, particleGroup;
        let isRotating = true;
        let isPulsing = false;
        let isWireframe = false;
        let time = 0;
        
        // Configuration
        const CONFIG = {
            coreRadius: 3,
            neuralNodes: 200,
            quantumArms: 16,
            particleCount: 2000,
            colors: {
                electricBlue: 0x00d4ff,
                quantumViolet: 0x7c3aed,
                neuralGold: 0xfbbf24,
                synapseTeal: 0x0d9488,
                coreWhite: 0xf8fafc,
                void: 0x020408
            }
        };
        
        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(CONFIG.colors.void, 0.015);
            
            // Camera
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 15, 35);
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 10;
            controls.maxDistance = 80;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;
            
            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambientLight);
            
            const pointLight1 = new THREE.PointLight(CONFIG.colors.electricBlue, 2, 100);
            pointLight1.position.set(20, 20, 20);
            scene.add(pointLight1);
            
            const pointLight2 = new THREE.PointLight(CONFIG.colors.quantumViolet, 2, 100);
            pointLight2.position.set(-20, -20, 20);
            scene.add(pointLight2);
            
            const pointLight3 = new THREE.PointLight(CONFIG.colors.neuralGold, 1.5, 100);
            pointLight3.position.set(0, 0, -30);
            scene.add(pointLight3);
            
            // Create system components
            createSuperIntelligenceCore();
            createNeuralNetwork();
            createQuantumTransmission();
            createParticleField();
            createDimensionalRings();
            
            // Event listeners
            window.addEventListener('resize', onWindowResize);
            
            // Hide loading screen
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 1500);
            
            // Start animation
            animate();
        }
        
        function createSuperIntelligenceCore() {
            coreGroup = new THREE.Group();
            
            // Inner core - glowing sphere
            const coreGeometry = new THREE.SphereGeometry(CONFIG.coreRadius, 64, 64);
            const coreMaterial = new THREE.MeshBasicMaterial({
                color: CONFIG.colors.coreWhite,
                transparent: true,
                opacity: 0.9
            });
            const core = new THREE.Mesh(coreGeometry, coreMaterial);
            coreGroup.add(core);
            
            // Outer glow layers
            for (let i = 1; i <= 5; i++) {
                const glowGeometry = new THREE.SphereGeometry(CONFIG.coreRadius + i * 0.8, 32, 32);
                const glowMaterial = new THREE.MeshBasicMaterial({
                    color: i % 2 === 0 ? CONFIG.colors.quantumViolet : CONFIG.colors.electricBlue,
                    transparent: true,
                    opacity: 0.15 - i * 0.02,
                    side: THREE.BackSide
                });
                const glow = new THREE.Mesh(glowGeometry, glowMaterial);
                coreGroup.add(glow);
            }
            
            // Energy rings around core
            for (let i = 0; i < 3; i++) {
                const ringGeometry = new THREE.TorusGeometry(CONFIG.coreRadius + 2 + i, 0.05, 16, 100);
                const ringMaterial = new THREE.MeshBasicMaterial({
                    color: CONFIG.colors.synapseTeal,
                    transparent: true,
                    opacity: 0.6
                });
                const ring = new THREE.Mesh(ringGeometry, ringMaterial);
                ring.rotation.x = Math.PI / 2 + i * 0.5;
                ring.rotation.y = i * 0.3;
                coreGroup.add(ring);
                
                // Animate rings
                gsap.to(ring.rotation, {
                    z: Math.PI * 2,
                    duration: 10 + i * 5,
                    repeat: -1,
                    ease: "none"
                });
            }
            
            scene.add(coreGroup);
        }
        
        function createNeuralNetwork() {
            neuralGroup = new THREE.Group();
            
            const nodes = [];
            const nodeGeometry = new THREE.SphereGeometry(0.15, 16, 16);
            const nodeMaterial = new THREE.MeshBasicMaterial({
                color: CONFIG.colors.neuralGold
            });
            
            // Create clustered nodes
            const clusters = 8;
            for (let c = 0; c < clusters; c++) {
                const clusterAngle = (c / clusters) * Math.PI * 2;
                const clusterDist = 12 + Math.random() * 8;
                const cx = Math.cos(clusterAngle) * clusterDist;
                const cy = Math.sin(clusterAngle) * clusterDist;
                const cz = (Math.random() - 0.5) * 10;
                
                for (let n = 0; n < CONFIG.neuralNodes / clusters; n++) {
                    const offsetAngle = Math.random() * Math.PI * 2;
                    const offsetDist = Math.random() * 5;
                    const x = cx + Math.cos(offsetAngle) * offsetDist;
                    const y = cy + Math.sin(offsetAngle) * offsetDist;
                    const z = cz + (Math.random() - 0.5) * 5;
                    
                    const node = new THREE.Mesh(nodeGeometry, nodeMaterial.clone());
                    node.position.set(x, y, z);
                    
                    // Add glow effect
                    const glowGeometry = new THREE.SphereGeometry(0.4, 16, 16);
                    const glowMaterial = new THREE.MeshBasicMaterial({
                        color: CONFIG.colors.neuralGold,
                        transparent: true,
                        opacity: 0.3
                    });
                    const glow = new THREE.Mesh(glowGeometry, glowMaterial);
                    node.add(glow);
                    
                    neuralGroup.add(node);
                    nodes.push(node);
                }
            }
            
            // Create connections
            const lineMaterial = new THREE.LineBasicMaterial({
                color: CONFIG.colors.neuralGold,
                transparent: true,
                opacity: 0.2
            });
            
            for (let i = 0; i < nodes.length; i++) {
                let connections = 0;
                for (let j = i + 1; j < nodes.length && connections < 2; j++) {
                    const dist = nodes[i].position.distanceTo(nodes[j].position);
                    if (dist < 6) {
                        const geometry = new THREE.BufferGeometry().setFromPoints([
                            nodes[i].position,
                            nodes[j].position
                        ]);
                        const line = new THREE.Line(geometry, lineMaterial);
                        neuralGroup.add(line);
                        connections++;
                    }
                }
            }
            
            scene.add(neuralGroup);
        }
        
        function createQuantumTransmission() {
            quantumGroup = new THREE.Group();
            
            // Create spiral arms
            for (let arm = 0; arm < CONFIG.quantumArms; arm++) {
                const baseAngle = (arm / CONFIG.quantumArms) * Math.PI * 2;
                const armColor = arm % 2 === 0 ? CONFIG.colors.quantumViolet : CONFIG.colors.electricBlue;
                
                const points = [];
                for (let t = 0; t < 100; t++) {
                    const r = 4 + t * 0.3;
                    const angle = baseAngle + t * 0.1;
                    const x = Math.cos(angle) * r;
                    const y = Math.sin(angle) * r;
                    const z = Math.sin(t * 0.1) * 2;
                    points.push(new THREE.Vector3(x, y, z));
                }
                
                const curve = new THREE.CatmullRomCurve3(points);
                const tubeGeometry = new THREE.TubeGeometry(curve, 100, 0.03, 8, false);
                const tubeMaterial = new THREE.MeshBasicMaterial({
                    color: armColor,
                    transparent: true,
                    opacity: 0.6
                });
                const tube = new THREE.Mesh(tubeGeometry, tubeMaterial);
                quantumGroup.add(tube);
                
                // Add transmission nodes along arms
                for (let i = 10; i < 100; i += 15) {
                    const t = i / 100;
                    const pos = curve.getPoint(t);
                    const nodeGeometry = new THREE.SphereGeometry(0.2, 16, 16);
                    const nodeMaterial = new THREE.MeshBasicMaterial({
                        color: armColor,
                        transparent: true,
                        opacity: 0.8
                    });
                    const node = new THREE.Mesh(nodeGeometry, nodeMaterial);
                    node.position.copy(pos);
                    
                    // Glow
                    const glowGeometry = new THREE.SphereGeometry(0.5, 16, 16);
                    const glowMaterial = new THREE.MeshBasicMaterial({
                        color: armColor,
                        transparent: true,
                        opacity: 0.2
                    });
                    const glow = new THREE.Mesh(glowGeometry, glowMaterial);
                    node.add(glow);
                    
                    quantumGroup.add(node);
                    
                    // Animate nodes
                    gsap.to(node.scale, {
                        x: 1.5,
                        y: 1.5,
                        z: 1.5,
                        duration: 1 + Math.random(),
                        repeat: -1,
                        yoyo: true,
                        ease: "sine.inOut",
                        delay: Math.random() * 2
                    });
                }
            }
            
            scene.add(quantumGroup);
        }
        
        function createParticleField() {
            particleGroup = new THREE.Group();
            
            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];
            const sizes = [];
            
            const colorPalette = [
                new THREE.Color(CONFIG.colors.electricBlue),
                new THREE.Color(CONFIG.colors.quantumViolet),
                new THREE.Color(CONFIG.colors.synapseTeal),
                new THREE.Color(CONFIG.colors.neuralGold)
            ];
            
            for (let i = 0; i < CONFIG.particleCount; i++) {
                // Spherical distribution with bias toward center
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                const r = 5 + Math.random() * 40;
                
                const x = r * Math.sin(phi) * Math.cos(theta);
                const y = r * Math.sin(phi) * Math.sin(theta);
                const z = r * Math.cos(phi);
                
                positions.push(x, y, z);
                
                const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                colors.push(color.r, color.g, color.b);
                
                sizes.push(Math.random() * 0.1 + 0.02);
            }
            
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.Float32BufferAttribute(sizes, 1));
            
            const material = new THREE.PointsMaterial({
                size: 0.1,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });
            
            const particles = new THREE.Points(geometry, material);
            particleGroup.add(particles);
            scene.add(particleGroup);
        }
        
        function createDimensionalRings() {
            const ringGroup = new THREE.Group();
            
            for (let i = 0; i < 8; i++) {
                const radius = 8 + i * 3;
                const tube = 0.02;
                
                // Create distorted ring using multiple segments
                const points = [];
                for (let j = 0; j <= 64; j++) {
                    const angle = (j / 64) * Math.PI * 2;
                    const distortion = Math.sin(angle * 6 + i) * 0.5;
                    const x = Math.cos(angle) * (radius + distortion);
                    const y = Math.sin(angle) * (radius + distortion);
                    const z = Math.cos(angle * 3) * 0.5;
                    points.push(new THREE.Vector3(x, y, z));
                }
                
                const curve = new THREE.CatmullRomCurve3(points, true);
                const geometry = new THREE.TubeGeometry(curve, 128, tube, 8, true);
                const material = new THREE.MeshBasicMaterial({
                    color: CONFIG.colors.electricBlue,
                    transparent: true,
                    opacity: 0.3 - i * 0.03
                });
                
                const ring = new THREE.Mesh(geometry, material);
                ringGroup.add(ring);
            }
            
            scene.add(ringGroup);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            time += 0.01;
            
            // Rotate entire system
            if (isRotating) {
                coreGroup.rotation.y += 0.002;
                neuralGroup.rotation.y -= 0.001;
                quantumGroup.rotation.z += 0.003;
                particleGroup.rotation.y += 0.0005;
            }
            
            // Pulse effect
            if (isPulsing) {
                const scale = 1 + Math.sin(time * 3) * 0.1;
                coreGroup.scale.set(scale, scale, scale);
            }
            
            // Update controls
            controls.update();
            
            // Render
            renderer.render(scene, camera);
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Control functions
        function toggleRotation() {
            isRotating = !isRotating;
            controls.autoRotate = isRotating;
            document.getElementById('btn-rotate').classList.toggle('active');
        }
        
        function togglePulse() {
            isPulsing = !isPulsing;
            document.getElementById('btn-pulse').classList.toggle('active');
            if (!isPulsing) {
                gsap.to(coreGroup.scale, { x: 1, y: 1, z: 1, duration: 0.5 });
            }
        }
        
        function toggleWireframe() {
            isWireframe = !isWireframe;
            document.getElementById('btn-wireframe').classList.toggle('active');
            
            scene.traverse((child) => {
                if (child.isMesh && child.material) {
                    child.material.wireframe = isWireframe;
                }
            });
        }
        
        function resetView() {
            gsap.to(camera.position, {
                x: 0,
                y: 15,
                z: 35,
                duration: 1.5,
                ease: "power2.inOut"
            });
            controls.target.set(0, 0, 0);
        }
        
        // Initialize
        init();
    </script>
</body>
</html>
